<!DOCTYPE html>
<html>
<head><title>Admin Panel</title></head>
<body style="background:#000; color:#fff; font-family:sans-serif; padding:50px;">
    <h2>Post New Article</h2>
    <form method="POST">
        <input type="text" name="title" placeholder="Title" required style="width:100%; margin:10px 0;"><br>
        <textarea name="content" placeholder="Content" style="width:100%; height:100px; margin:10px 0;"></textarea><br>
        <input type="text" name="image" placeholder="Image URL" style="width:100%; margin:10px 0;"><br>
        <select name="category" style="width:100%; margin:10px 0;">
            <option value="india">India</option>
            <option value="technology">Crypto</option>
            <option value="business">Forex</option>
        </select><br>
        <button type="submit" style="background:#00d2ff; padding:10px 20px;">POST TO SITE</button>
    </form>
</body>
</html>
